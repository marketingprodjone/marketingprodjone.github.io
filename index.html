<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketingProdjone | Pinterest Snaps Premium</title>
    <style>
        /* MARKETINGPRODJONE ULTIMATE ARCHITECTURE 2026
           Ovaj kod je optimiziran za GitHub Pages i mobilne uređaje.
           Sadrži napredne CSS varijable i animacije.
        */

        :root {
            --p-red: #e60023;
            --fb-blue: #0866ff;
            --dark: #1c1e21;
            --light: #f0f2f5;
            --white: #ffffff;
            --gray: #65676b;
            --shadow-standard: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
            --radius-main: 24px;
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition-smooth: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* OSNOVNI RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* SCROLLBAR STIL */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--light); }
        ::-webkit-scrollbar-thumb { background: var(--p-red); border-radius: 10px; }

        /* HEADER & NAVIGACIJA */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1.5rem 5%;
            position: sticky;
            top: 0;
            z-index: 9999;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow-standard);
        }

        .logo-area h1 {
            color: var(--p-red);
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            cursor: default;
        }

        nav {
            display: flex;
            gap: 25px;
            margin-top: 5px;
        }

        nav a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            padding: 10px 20px;
            border-radius: 50px;
            transition: var(--transition-smooth);
            border: 2px solid transparent;
        }

        nav a:hover {
            border-color: var(--p-red);
            color: var(--p-red);
            transform: translateY(-2px);
        }

        nav a.active-link {
            background: var(--fb-blue);
            color: var(--white);
        }

        /* HERO SEKCIJA */
        .hero {
            padding: 8rem 1rem 4rem;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h2 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, var(--p-red), var(--fb-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--gray);
            font-weight: 500;
        }

        /* GRID KONTEJNER */
        .main-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3.5rem;
        }

        /* KARTICE DIZAJN */
        .card-item {
            background: var(--white);
            border-radius: var(--radius-main);
            overflow: hidden;
            box-shadow: var(--shadow-standard);
            transition: var(--transition-smooth);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .card-item:hover {
            transform: translateY(-25px) rotate(1deg);
            box-shadow: var(--shadow-hover);
        }

        .card-img-wrapper {
            width: 100%;
            height: 300px;
            overflow: hidden;
            background: #eee;
            position: relative;
        }

        /* Overlay efekt na slikama */
        .card-img-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.4));
            opacity: 0;
            transition: 0.3s;
        }
