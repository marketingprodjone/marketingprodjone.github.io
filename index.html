<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketingProdjone | Pinterest Snaps</title>
    <style>
        /* MARKETINGPRODJONE - NAPREDNI STIL 2026 
           Ovaj kod sadrži detaljne vizualne upute za moderan izgled.
        */

        :root {
            --primary-color: #e60023; /* Pinterest crvena */
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --fb-blue: #1877f2;
            --shadow-sm: 0 2px 4px rgba(0,0,0,.08);
            --shadow-md: 0 12px 28px rgba(0,0,0,.12);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Osnovne postavke */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Zaglavlje (Header) */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 15px;
        }

        /* Navigacija */
        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            padding: 5px 0;
            border-bottom: 3px solid transparent;
        }

        nav a:hover {
            color: var(--fb-blue);
            border-bottom: 3px solid var(--fb-blue);
        }

        /* Glavni sadržaj */
        .container {
            max-width: 1300px;
            margin: 4rem auto;
            padding: 0 30px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 5rem;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #1c1e21, #e60023);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Rešetka s karticama (Grid) */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        /* Kartica ploče */
        .board-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .board-card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow-md);
            border-color: var(--fb-blue);
        }

        /* Slika unutar kartice */
        .image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background-color: #e4e6eb;
            position: relative;
        }

        .board-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .board-card:hover .board-image {
            transform: scale(1.1);
        }

        /* Sadržaj kartice */
        .board-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .board-content h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #050505;
        }

        .board-content p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        /* Gumb u kartici */
        .btn-visit {
            margin-top: auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .board-card:hover .btn-visit {
            background: var(--fb-blue);
        }

        /* Podnožje (Footer) */
        footer {
            background: white;
            margin-top: 8rem;
            padding: 5rem 1rem;
            text-align: center;
            border-top: 1px solid #e4e6eb;
        }

        footer .social-link {
            color: var(--fb-blue);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 20px;
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Prilagodba za mobitele */
        @media (max-width: 768px) {
            .hero-section h2 { font-size: 2.2rem; }
            .board-grid { gap: 25px; }
            header { padding: 1.5rem 1rem; }
            nav { gap: 15px; }
        }

        /* Dodatni dekorativni elementi */
        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-color);
            z-index: 10;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
